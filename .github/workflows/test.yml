name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python sources
        run: >-
          python -m py_compile
          plugins/codex-one-turn/lib/state_store.py
          plugins/codex-one-turn/hooks/oneturn_hook.py
          plugins/codex-one-turn/mcp/server.py
          tests/test_one_turn.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Validate shell installer
        if: runner.os != 'Windows'
        run: |
          bash -n install.sh
      - name: Validate PowerShell installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path install.ps1),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
      - name: Validate JSON files
        run: >-
          python -c "import json, pathlib;
          [json.loads(pathlib.Path(p).read_text(encoding='utf-8')) for p in
          ['plugins/codex-one-turn/.codex-plugin/plugin.json',
          'plugins/codex-one-turn/.mcp.json',
          'plugins/codex-one-turn/hooks/hooks.json',
          '.agents/plugins/marketplace.json']]"
